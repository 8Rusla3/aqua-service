[build]
  publish = "."
  command = "echo 'No build step required'"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/gallery"
  to = "/gallery/"
  status = 301

[[redirects]]
  from = "/gallery/"
  to = "/gallery/"
  status = 301

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 301

[[redirects]]
  from = "/thanks"
  to = "/thanks/"
  status = 301

[[redirects]]
  from = "/thanks/"
  to = "/thanks/"
  status = 301

# Performance & Security Headers for 10k+ concurrent users
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Performance
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
    # Enable compression
    Content-Security-Policy = "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval';"

# CSS files - Immutable, long-term caching
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JavaScript files - Immutable, long-term caching
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images - Long-term caching with revalidation
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files - Shorter cache for updates
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"