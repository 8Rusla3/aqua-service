<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Thanks — Aqua Service Inc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1d9bf0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="page">
      <header role="banner">
        <div class="nav">
          <a href="/index.html" class="logo" aria-label="Aqua Service Inc - Home">
            <div class="logo-mark">AQ</div>
            <div class="logo-text">
              <span>Aqua Service Inc</span>
              <span>Toronto Drain & Waterproofing Experts</span>
            </div>
          </a>
        </div>
      </header>

      <main>
        <section class="section hero" id="top">
          <div class="section-inner hero-grid">
            <div class="hero-content">
              <div class="hero-badge">
                <span class="hero-badge-dot"></span>
                Message received
              </div>
              <h1 class="hero-title">
                Thanks — we’ll get back to you soon.
                <span>Usually within 24 hours.</span>
              </h1>
              <p class="hero-subtitle">
                If this is urgent, please call us and we’ll respond as fast as
                possible.
              </p>

              <div class="hero-cta-row">
                <a href="tel:+14372639810" class="btn btn-primary">Call now</a>
                <a href="/index.html#contact" class="btn btn-ghost"
                  >Send another message</a
                >
                <a href="/index.html" class="btn btn-secondary">Back to home</a>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
